sonar.projectKey=donsang
sonar.projectName=donsang
sonar.sources=.
sonar.host.url=http://localhost:9000

# Exclusions from analysis
sonar.exclusions=node_modules/**,vendor/**,bootstrap/**,storage/**,frontend/node_modules/**,frontend/dist/**,frontend/src/i18n/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,frontend/playwright-fixture.ts,playwright.config.ts

# Exclusions from coverage (since we don't want to enforce 80% coverage on new UI files)
sonar.coverage.exclusions=frontend/src/i18n/**,frontend/src/components/ui/**,frontend/src/pages/**,frontend/src/components/patient/**,frontend/src/components/hospital/**,frontend/src/lib/api.ts

# Exclusions from duplication checks (specifically translation files and minor duplicate routes)
sonar.cpd.exclusions=frontend/src/i18n/**,frontend/src/pages/ForgotPassword.tsx,frontend/src/pages/ResetPassword.tsx
